services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:16}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    pids_limit: 256
    mem_limit: 512m

  app:
    image: ${APP_IMAGE_NAME:-jp-n1:deploy}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=256
      HOSTNAME: 0.0.0.0
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_BIND_IP:-0.0.0.0}:3000:3000"
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 256m

volumes:
  postgres_data:
